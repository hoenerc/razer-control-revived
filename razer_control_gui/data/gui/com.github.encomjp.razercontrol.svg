<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- razer-control-revived app icon (original artwork, this fork).
       A fan rotor: three round-capped arc segments (stroke-dasharray tuned to
       exactly three blades on r=36), hub, shroud ring, dark tile. Razer GREEN
       is just a colour; the snake mark stays with Razer. Flat by design so it
       stays crisp from the 16 px tray to the 128 px app grid. -->
  <rect x="8" y="8" width="112" height="112" rx="26" fill="#1d232b"/>
  <circle cx="64" cy="64" r="52" fill="none" stroke="#313b49" stroke-width="4"/>
  <circle cx="64" cy="64" r="36" fill="none" stroke="#44d62c" stroke-width="20"
          stroke-linecap="round" stroke-dasharray="34 41.4"
          transform="rotate(18 64 64)"/>
  <circle cx="64" cy="64" r="13" fill="#44d62c"/>
  <circle cx="64" cy="64" r="5" fill="#1d232b"/>
</svg>
